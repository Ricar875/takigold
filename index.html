<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taki Gold | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>

    <div class="px-5 py-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xs font-extrabold text-white tracking-widest uppercase flex items-center gap-2">
                <span class="w-1.5 h-3 bg-amber-400 rounded-full"></span>
                Sabores Selecionados Gold
            </h2>
            <span class="text-[9px] text-amber-400 font-bold uppercase tracking-wider">Alta Cozinha</span>
        </div>

        <!-- Grid de Fotos Vibrantes -->
        <div id="restaurante-grid" class="grid grid-cols-2 gap-3.5">
            
            <!-- Prato 1: Hamburgueria -->
            <div class="relative rounded-2xl overflow-hidden cursor-pointer shadow-lg hover:ring-2 ring-amber-400 transition" 
                 onclick="openDishDetail('Viking Burger', 'Monstro Duplo', 'Hambúrguer artesanal de costela com triplo queijo cheddar derretido')">
                
                <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent z-10"></div>
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=500&q=80" alt="Hamburguer" class="w-full h-48 object-cover">

                <!-- Selo de Avaliação -->
                <span class="absolute top-2.5 left-2.5 z-20 bg-slate-950/80 backdrop-blur-md text-[9px] text-amber-400 font-extrabold px-2 py-1 rounded">
                    <i class="fas fa-star mr-1"></i> 4.9
                </span>

                <div class="absolute bottom-3.5 left-3.5 right-3.5 z-20">
                    <span class="text-[8px] bg-amber-400 text-[#05101E] font-extrabold px-2 py-0.5 rounded uppercase tracking-wider mb-1.5 inline-block">
                        Favorito
                    </span>
                    <h4 class="text-xs font-extrabold text-white leading-tight mb-1">Monstro Duplo</h4>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-amber-400">R$ 32,90</span>
                        <span class="text-[8px] text-emerald-400 font-bold"><i class="fas fa-truck mr-1"></i> Grátis</span>
                    </div>
                </div>
            </div>

            <!-- Prato 2: Exemplo Adicional -->
            <div class="relative rounded-2xl overflow-hidden cursor-pointer shadow-lg hover:ring-2 ring-amber-400 transition" 
                 onclick="openDishDetail('Sushi Gold', 'Combo Premium', 'Seleção exclusiva de peixes nobres e molhos especiais')">
                
                <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent z-10"></div>
                <img src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?auto=format&fit=crop&w=500&q=80" alt="Sushi" class="w-full h-48 object-cover">
                
                <span class="absolute top-2.5 left-2.5 z-20 bg-slate-950/80 backdrop-blur-md text-[9px] text-amber-400 font-extrabold px-2 py-1 rounded">
                    <i class="fas fa-star mr-1"></i> 4.8
                </span>

                <div class="absolute bottom-3.5 left-3.5 right-3.5 z-20">
                    <span class="text-[8px] bg-amber-400 text-[#05101E] font-extrabold px-2 py-0.5 rounded uppercase tracking-wider mb-1.5 inline-block">
                        Popular
                    </span>
                    <h4 class="text-xs font-extrabold text-white leading-tight mb-1">Combo Premium</h4>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-amber-400">R$ 54,90</span>
                        <span class="text-[8px] text-emerald-400 font-bold"><i class="fas fa-truck mr-1"></i> Grátis</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openDishDetail(restaurante, prato, descricao) {
            console.log("Abrindo detalhes de: " + prato + " do restaurante " + restaurante);
            // Aqui você poderá adicionar a lógica para abrir o modal de detalhes
            alert("Você clicou em: " + prato + "\n" + descricao);
        }
    </script>

</body>
</html>
